name: Daily RSS Crawl

on:
  schedule:
    # 08:00 PST = 16:00 UTC  (adjust if needed: 07:00 PST = 15:00 UTC)
    - cron: '0 16 * * *'
  workflow_dispatch:   # allows manual trigger from GitHub Actions tab

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit data.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawler
        run: python crawler.py --days 1

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data-*.json
          # Only commit if data.json actually changed
          git diff --staged --quiet || \
            git commit -m "data: daily update $(date -u +'%Y-%m-%d')" && \
            git push
